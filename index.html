<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff5b4d" />
  <meta name="description" content="Detox: A 7 Day Fresh Start by Perfect Women" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Detox — A 7 Day Fresh Start</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header id="topbar" class="topbar hidden">
      <button id="backBtn" class="icon-button hidden" type="button" aria-label="Go back">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
      </button>
      <div class="brand-lockup" aria-label="Detox by Perfect Women">
        <img class="brand-wordmark" src="assets/logo-detox-word.png" alt="Detox" />
        <span class="brand-tagline">By Perfect Women</span>
      </div>
      <button id="settingsBtn" class="icon-button" type="button" aria-label="Open settings">
        <svg class="ui-icon" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.08A1.7 1.7 0 0 0 9 19.36a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.64 15a1.7 1.7 0 0 0-1.56-1.03H3v-4h.08A1.7 1.7 0 0 0 4.64 9a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.64a1.7 1.7 0 0 0 1.03-1.56V3h4v.08A1.7 1.7 0 0 0 15 4.64a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.36 9a1.7 1.7 0 0 0 1.56 1.03H21v4h-.08A1.7 1.7 0 0 0 19.4 15Z"></path></svg>
      </button>
    </header>

    <section id="dayIndicator" class="day-indicator hidden" aria-label="Seven-day programme progress"></section>

    <main id="main" class="main-content" aria-live="polite"></main>

    <nav id="bottomNav" class="bottom-nav hidden" aria-label="Main navigation">
      <button type="button" data-view="today" class="nav-item active">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.5"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"></path></svg>
        <small>Today</small>
      </button>
      <button type="button" data-view="days" class="nav-item">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"></rect><path d="M8 3v4M16 3v4M3 10h18"></path><path d="M8 14h2M14 14h2M8 18h2M14 18h2"></path></svg>
        <small>7 Days</small>
      </button>
      <button type="button" data-view="recipes" class="nav-item">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11h16c0 5-3.6 8-8 8s-8-3-8-8Z"></path><path d="M7 21h10M8 8c0-2 2-2 2-4M13 8c0-2 2-2 2-4"></path></svg>
        <small>Recipes</small>
      </button>
      <button type="button" data-view="progress" class="nav-item">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"></path></svg>
        <small>Progress</small>
      </button>
      <button type="button" data-view="protocols" class="nav-item">
        <svg class="ui-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="10" height="18" rx="2"></rect><path d="M9 17h2M18 8a5 5 0 1 1-1.2 8.2"></path><path d="M18 4v4h4"></path></svg>
        <small>Protocols</small>
      </button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
